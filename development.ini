[app:main]
use = egg:multitwitch
multitwitch.session_secret = change-me-in-development
multitwitch.twitch_client_id = change-me
multitwitch.twitch_client_secret = change-me
multitwitch.twitch_redirect_uri = http://localhost:6543/auth/twitch/callback
multitwitch.twitch_scope = user:read:follows

pyramid.reload_templates = true
pyramid.debug_authorization = false
pyramid.debug_notfound = false
pyramid.debug_routematch = false
pyramid.default_locale_name = en
pyramid.includes =
    pyramid_debugtoolbar
    pyramid_tm

[server:main]
use = egg:waitress#main
host = localhost
port = 6543

# Begin logging configuration

[loggers]
keys = root, multitwitch

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_multitwitch]
level = DEBUG
handlers =
qualname = multitwitch

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s][%(threadName)s] %(message)s

# End logging configuration
